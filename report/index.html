<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title> CS 4650 Final Project Report</title>
  <style>
    body { margin: 0; padding: 0; font-family: Arial, sans-serif; background: #f5f5f5; }
    .container { max-width: 100%; height: 100vh; display: flex; flex-direction: column; }
    header { background: #2c3e50; color: white; padding: 1rem; text-align: center; }
    h1 { margin: 0; font-size: 1.5rem; }
    iframe { flex: 1; border: none; -webkit-overflow-scrolling: touch; touch-action: manipulation; overflow: auto; }
    footer { background: #ecf0f1; padding: 0.5rem; text-align: center; font-size: 0.9rem; color: #666; }
    .download-link { padding: 0.5rem; text-align: center; background: #fff; border-top: 1px solid #ddd; }
    .download-link a { display: inline-block; padding: 0.5rem 1rem; background: #0366d6; color: white; text-decoration: none; border-radius: 4px; }
    /* Mobile optimizations */
    @supports (height: 100dvh) {
      .container { height: 100dvh; }
    }
    @media (max-width: 768px) {
      body { font-size: 14px; }
      header { padding: 0.5rem; }
      h1 { font-size: 1.2rem; }
      .download-link a { font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <iframe src="../report.pdf" title="Deep Past Akkadian Report"></iframe>
  </div>
  <div class="download-link">
    <a href="../report.pdf" download>📥 Download PDF</a>
  </div>
</body>
</html>
